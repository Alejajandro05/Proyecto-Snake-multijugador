services:
  backend:
    build: ./backend
    container_name: snake_backend
    volumes:
      - ./backend:/app
      - /app/node_modules # No borres esto, protege las librerías del contenedor
    ports:
      - "2567:2567"
    environment:
      - NODE_ENV=development

  frontend:
    build: ./frontend
    container_name: snake_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend